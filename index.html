<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Tojas Festés</title>
</head>
<body>
    <h1>Tojas Festés</h1>
    <p>Boldog Húsvéti Ünepeket</p>
    <h3>Fess csikos tojast</h3>
    <div class="rajz" id="rajz_szinezes"></div>

    <div id="paletta">
        Szín:
        <button class="color-btn" data-color="#f44336" style="background:#f44336"></button>
        <button class="color-btn" data-color="#ffeb3b" style="background:#ffeb3b"></button>
        <button class="color-btn" data-color="#4caf50" style="background:#4caf50"></button>
        <button class="color-btn" data-color="#2196f3" style="background:#2196f3"></button>
        <button class="color-btn" data-color="#9c27b0" style="background:#9c27b0"></button>
        <button class="color-btn" data-color="#e91e63" style="background:#e91e63"></button>
        <button class="color-btn" data-color="#000000" style="background:#000000"></button>
        <button class="color-btn" data-color="#ffffff" style="background:#ffffff"></button>
        <span id="selectedColor" style="margin-left:12px;font-weight:bold;">Választott: #f44336</span>
    </div>

    <button id="szinezes_gomb">Színezés</button>
    <button id="torles_gomb">Törlés</button>
    <button id="tojas_valto">Másik Tojás</button>
    <button id="mentes">Mentés</button>

    <script src="index.js"></script>
</body>
</html>
